name: firebase_auth_kit
description: Ready-to-use Firebase authentication UI for Flutter. Drop-in login & signup screens with email/password, Google Sign-In, and phone OTP. Fully customizable via AuthUIConfig.
version: 0.1.2

homepage: https://github.com/Praful2604/firebase_auth_kit
repository: https://github.com/Praful2604/firebase_auth_kit
issue_tracker: https://github.com/Praful2604/firebase_auth_kit/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  google_sign_in: ^7.2.0

  


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

platforms:
  android:
  ios:
  web:
  macos:

flutter: